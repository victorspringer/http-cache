language: go
dist: jammy

go:
  - "1.26.3"

services:
  - docker

cache:
  directories:
    - $GOPATH/pkg/mod
    - $HOME/.cache/go-build

before_install:
  - docker run -d -p 6379:6379 redis:7-alpine
  - go install github.com/mattn/goveralls@latest

install:
  - go mod download

script:
  - go vet ./...
  - go test -cover -race -v -covermode=atomic -coverprofile=coverage.out ./...

after_success:
  - if [ -n "$COVERALLS_TOKEN" ]; then goveralls -coverprofile=coverage.out -service=travis-ci -repotoken "$COVERALLS_TOKEN"; else echo "COVERALLS_TOKEN is not set; skipping Coveralls upload"; fi
